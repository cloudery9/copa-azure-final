name: Deploy Phase 06 — Flow Visualizer (FlowEvents Container App + /flow frontend)

# EPIC-002 / Story 2.6 (F6 — Flow Visualizer com correlation ID em tempo real). Faz DUAS
# coisas, em jobs separados:
#   1. deploy-flow-events : build+test do serviço FlowEvents .NET (Azure.Monitor.Query +
#      Microsoft.Azure.SignalR — Hub clássico FlowHub), build da imagem Docker, push no
#      ACR e update do Container App. Injeta App Settings: AzureSignalRConnectionString +
#      LogAnalyticsWorkspaceId + FrontendOrigin.
#   2. deploy-frontend    : build do frontend (Vite) com a rota /flow (FlowDiagram +
#      animação framer-motion + SignalR client), com VITE_* do gateway/SignalR embutidas,
#      e deploy no Azure Web App.
#
# Dispara no push da branch da fase ou manualmente.
#
# O NÓ ZERO do fluxo é o Gateway YARP (ADE-004) — NUNCA APIM (APIM não existe no EPIC-002).
#
# Pré-requisitos (configurados pelo @devops / por aluno):
#   FlowEvents (Container App):
#     - secret  AZURE_CREDENTIALS               : service principal (az login)
#     - var     ACR_LOGIN_SERVER               : ex. acrfifa2026xy.azurecr.io
#     - var     PHASE06_FLOW_APP_NAME          : nome do Container App do FlowEvents
#     - var     PHASE02_RESOURCE_GROUP         : resource group do aluno (reuso de F2)
#     - secret  PHASE06_SIGNALR_CONNECTION_STRING : connection string do Azure SignalR
#     - var     PHASE06_LOG_ANALYTICS_WORKSPACE_ID : GUID do workspace Log Analytics (AC-3)
#     - var     PHASE06_FRONTEND_ORIGIN        : origin do front (CORS; SignalR usa credentials)
#   Frontend (Web App):
#     - secret  AZURE_FRONTEND_PUBLISH_PROFILE : publish profile do Web App do front
#     - var     FRONTEND_APP_NAME             : nome do Web App do frontend
#     - var     VITE_GATEWAY_V2_URL           : URL do gateway YARP (rotas /flow-events/**)
#     - var     VITE_FLOW_EVENTS_BASE_URL     : base das rotas FlowEvents via gateway
#                                               (= ${VITE_GATEWAY_V2_URL}/flow-events)
#
# NOTA (AC-3): a Managed Identity do Container App do FlowEvents precisa do papel
# "Log Analytics Reader" no workspace, senão o LogsQueryClient recebe 403.

on:
  push:
    branches: [phase-06-flow-visualizer]
    paths:
      - 'src/Fifa2026.V2.FlowEvents/**'
      - 'src/Fifa2026.V2.FlowEvents.Tests/**'
      - 'src/Fifa2026.V2.Gateway/**'
      - 'Lovable/World Cup Tickets Hub/**'
      - 'infra/phase-06/**'
      - '.github/workflows/deploy-phase-06.yml'
  workflow_dispatch:
    inputs:
      flow_app_name:
        description: 'FlowEvents Container App name (override)'
        required: false
      frontend_app_name:
        description: 'Frontend Web App name (override)'
        required: false

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  FLOW_PROJECT_PATH: 'src/Fifa2026.V2.FlowEvents'
  FLOW_TEST_PATH: 'src/Fifa2026.V2.FlowEvents.Tests'
  IMAGE_NAME: 'flow-events'
  WORKING_DIR: 'Lovable/World Cup Tickets Hub'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — FlowEvents .NET (App Insights query + SignalR FlowHub).
  # ---------------------------------------------------------------------------
  deploy-flow-events:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.FLOW_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.FLOW_PROJECT_PATH }} -c Release --no-restore

      - name: Test
        # SEM --no-build (lição do gate S2.1 / H-1): o dotnet test faz restore+build do
        # projeto de testes E da dependência Fifa2026.V2.FlowEvents em Release. Os steps
        # Restore/Build acima cobrem só o projeto do FlowEvents, não o de testes — usar
        # --no-build aqui falharia.
        run: dotnet test ${{ env.FLOW_TEST_PATH }} -c Release --verbosity normal
        continue-on-error: false

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_LOGIN_SERVER }}

      - name: Build & push Docker image
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" "${{ env.FLOW_PROJECT_PATH }}"
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy Container App + App Settings
        env:
          FLOW_APP_NAME: ${{ github.event.inputs.flow_app_name || vars.PHASE06_FLOW_APP_NAME }}
          SIGNALR_CONNECTION_STRING: ${{ secrets.PHASE06_SIGNALR_CONNECTION_STRING }}
          LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.PHASE06_LOG_ANALYTICS_WORKSPACE_ID }}
          FRONTEND_ORIGIN: ${{ vars.PHASE06_FRONTEND_ORIGIN }}
        run: |
          set -euo pipefail
          RG=${{ vars.PHASE02_RESOURCE_GROUP }}
          # Atualiza a imagem.
          az containerapp update \
            --name "$FLOW_APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE_TAG"
          # Secret sensível (connection string do SignalR) — nunca em var/repo.
          az containerapp secret set \
            --name "$FLOW_APP_NAME" --resource-group "$RG" \
            --secrets "azure-signalr-conn=${SIGNALR_CONNECTION_STRING}"
          # Env vars (secretref p/ a connection string; valores não sensíveis diretos).
          az containerapp update \
            --name "$FLOW_APP_NAME" --resource-group "$RG" \
            --set-env-vars \
              "AzureSignalRConnectionString=secretref:azure-signalr-conn" \
              "LogAnalyticsWorkspaceId=${LOG_ANALYTICS_WORKSPACE_ID}" \
              "FrontendOrigin=${FRONTEND_ORIGIN}"

      - name: Smoke test (/health do FlowEvents)
        env:
          FLOW_APP_NAME: ${{ github.event.inputs.flow_app_name || vars.PHASE06_FLOW_APP_NAME }}
        run: |
          set -euo pipefail
          RG=${{ vars.PHASE02_RESOURCE_GROUP }}
          FQDN=$(az containerapp show \
            --name "$FLOW_APP_NAME" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Aguardando warmup (cold start scale-to-zero)..."
          sleep 20
          curl -fsS "https://${FQDN}/health" | tee health.json
          jq -e '.status == "healthy"' health.json
          echo "Smoke test OK — FlowEvents healthy."

  # ---------------------------------------------------------------------------
  # Job 2 — Frontend (rota /flow). Build Vite com VITE_* do gateway/SignalR.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint

      - name: Build (vite) — rota /flow (FlowDiagram + framer-motion + SignalR)
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VITE_GATEWAY_V2_URL: ${{ vars.VITE_GATEWAY_V2_URL }}
          VITE_FLOW_EVENTS_BASE_URL: ${{ vars.VITE_FLOW_EVENTS_BASE_URL }}
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.event.inputs.frontend_app_name || vars.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: '${{ env.WORKING_DIR }}/dist'
